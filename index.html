<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Convenios de Pago · Avon CARD</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css">
<style>
#loading{position:fixed;inset:0;background:#0A2472;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:9999}
.spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,0.2);border-top:4px solid #E91E63;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{color:white;font-family:Poppins,sans-serif;font-size:14px;opacity:0.8}
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <div class="load-txt">Cargando Convenios de Pago...</div>
</div>
<div id="root"></div>
<script>
// Ocultar spinner cuando React monte
var _origCreate = document.createElement.bind(document);
window.addEventListener('DOMContentLoaded', function() {
  setTimeout(function() {
    var loading = document.getElementById('loading');
    var root = document.getElementById('root');
    if (root && root.children.length > 0) {
      loading.style.display = 'none';
    }
  }, 3000);
});
</script>
<script src="app.js" onerror="document.getElementById('loading').innerHTML='<div style=color:white;font-family:sans-serif;padding:20px>Error al cargar app.js — revisa la consola</div>'"></script>
<script>
// Si React no montó en 5 segundos, mostrar error
setTimeout(function() {
  var root = document.getElementById('root');
  var loading = document.getElementById('loading');
  if (root && root.children.length === 0) {
    loading.innerHTML = '<div style="color:white;font-family:sans-serif;text-align:center;padding:20px"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:18px;font-weight:700;margin-bottom:8px">Error al iniciar la aplicación</div><div style="opacity:0.7;font-size:13px">Abre la consola del navegador (F12) y reporta el error en rojo</div></div>';
  } else if (loading) {
    loading.style.display = 'none';
  }
}, 5000);
</script>
</body>
</html>
